<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultoria ciberseguridad </title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="banner-principal">
        <h1>Consultoria ciberseguirdad</h1>
        <h2 class="subtitulo-banner">Ayudando al cliente desde hace 30 años</h2>
        <nav class="menu-navegacion">
            <a href="./index.html">Inicio</a>
            <a href="./nosotros.html">Nosotros</a>
            <a href="./servicios.html">Servicios</a>
            <a href="./equipo.html">Equipo</a>
            <a href="./noticias.html">Noticias</a>
            <a href="./contactanos.html">Contactanos</a>
            <a href="./preguntasFrecuentes.html">Preguntas frecuentes</a>
</nav>
    </header>
    <main>
        <section class="formulario">

            <h2 class="center">Contactanos</h2>

            <div class="row">
                <div class="col-md-8 mx-auto card p-4 shadow-sm bg-light-subtle">
                    <form>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Correo electronico</label>
                            <input type="email" class="form-control" id="exampleInputEmail1"
                                placeholder="ejemplo@mail.com">
                            <div class="form-text">Nunca compartiremos su email con nadie... guiño.</div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Nombre" aria-label="First name">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Apellidos" aria-label="Last name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Seleccione razon de contacto</label>
                            <select class="form-select">
                                <option selected>Pulsa para seleccionar</option>
                                <option value="1">Consulta empresarial</option>
                                <option value="2">Consulta generica</option>
                                <option value="3">Enviar curriculum</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Texto</label>
                            <textarea class="form-control" rows="3" placeholder="Escribe lo que desee..."></textarea>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">No deseo recibir respuesta en mi mail</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Enviar</button>
                    </form>
                </div>
            </div>

        </section>
    </main>
    <footer>
        <p>
            Solmene N°1 LAB Aplicaciones y Tecnologías de la web
        </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
